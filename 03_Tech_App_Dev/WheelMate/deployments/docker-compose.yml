version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wheelmate
      POSTGRES_PASSWORD: wheelmate
      POSTGRES_DB: wheelmate
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      POSTGRES_DSN: postgresql+psycopg://wheelmate:wheelmate@db:5432/wheelmate
    depends_on:
      - db
    volumes:
      - ../data:/app/data            # hot-reload your CSVs
    ports:
      - "8000:8000"
volumes:
  db_data:
